name: Build Linux binaries (gs + rastertobrlaser)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'bin/**'
      - 'lib/**'
      - 'gs_share/**'
      - 'ppd/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gs and brlaser via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ghostscript \
            ghostscript-x \
            libgs-dev \
            printer-driver-brlaser \
            cups \
            libcups2-dev \
            libcupsimage2-dev

      - name: Locate binaries and PPDs
        run: |
          which gs
          gs --version
          ls -la /usr/lib/cups/filter/ | grep -i brlaser
          file /usr/lib/cups/filter/rastertobrlaser
          echo "=== brlaser PPDs disponibles ==="
          find / -name "br1600*" 2>/dev/null
          find / -name "brlaser*" -name "*.ppd*" 2>/dev/null | head -20
          find /usr/share -path "*brlaser*" 2>/dev/null | head -20

      - name: Copy binaries + dependencies + gs resources + PPD
        run: |
          rm -rf bin lib gs_share ppd
          mkdir -p bin lib gs_share ppd
          # GhostScript binary
          cp $(which gs) bin/gs
          chmod +x bin/gs
          # brlaser CUPS filter
          cp /usr/lib/cups/filter/rastertobrlaser bin/rastertobrlaser
          chmod +x bin/rastertobrlaser
          # Bundle shared library dependencies (excluding libc, ld-linux, libdl, libpthread, libm, libgcc_s)
          # which come from the Vercel runtime's own glibc.
          EXCLUDE_RE='^(linux-vdso|linux-gate|ld-linux|libc|libdl|libpthread|librt|libnsl|libutil|libresolv|libm|libgcc_s)\.so'
          for binary in bin/gs bin/rastertobrlaser; do
            ldd "$binary" | awk '{print $3}' | grep -v '^$' | while read lib; do
              base=$(basename "$lib")
              if echo "$base" | grep -qE "$EXCLUDE_RE"; then
                echo "  SKIP system lib: $base"
              else
                cp -L "$lib" lib/
                echo "  COPY: $base"
              fi
            done
          done
          # GhostScript resources (PostScript init files, CMaps, iccprofiles)
          # gs busca sus resources en GS_LIB / -I path
          GS_VER=$(gs --version)
          echo "gs version: $GS_VER"
          GS_SHARE_DIR=$(find /usr/share/ghostscript -maxdepth 2 -type d -name "Resource" 2>/dev/null | head -1)
          GS_SHARE_DIR=$(dirname "$GS_SHARE_DIR")
          echo "gs share dir: $GS_SHARE_DIR"
          # Usar tar para copiar Resource (más tolerante con symlinks rotos)
          if [ -d "$GS_SHARE_DIR/Resource" ]; then
            (cd "$GS_SHARE_DIR" && tar --ignore-failed-read -chf - Resource 2>/dev/null) | (cd gs_share && tar -xf - 2>/dev/null) || true
          fi
          # iccprofiles puede ser symlink en Ubuntu
          ICC_DIR="$GS_SHARE_DIR/iccprofiles"
          if [ -L "$ICC_DIR" ]; then
            ICC_DIR=$(readlink -f "$ICC_DIR")
          fi
          if [ -d "$ICC_DIR" ]; then
            mkdir -p gs_share/iccprofiles
            (cd "$ICC_DIR" && tar -cf - .) | (cd gs_share/iccprofiles && tar -xf -)
          fi
          # Buscar también /var/lib/ghostscript que es donde Ubuntu instala iccprofiles reales
          if [ -d /var/lib/ghostscript ]; then
            (cd /var/lib/ghostscript && tar --ignore-failed-read -chf - . 2>/dev/null) | (cd gs_share && tar -xf - 2>/dev/null) || true
          fi
          # Strip large fonts directory si gs usa font substitution
          rm -rf gs_share/Resource/Font 2>/dev/null || true
          # Stripear documentation/examples
          rm -rf gs_share/Resource/SoftMaskImage 2>/dev/null || true
          echo "=== Verificar default_gray.icc presente ==="
          find gs_share -name "default_gray.icc"

          # Copiar PPD Brother DCP-1600 series (br1600.ppd) que brlaser necesita
          # Los PPDs vienen en /usr/share/ppd/brlaser/ o comprimidos en /usr/share/cups/model/
          PPD_SRC=$(find / -name "br1600.ppd*" 2>/dev/null | head -1)
          echo "PPD source: $PPD_SRC"
          if [ -n "$PPD_SRC" ]; then
            if echo "$PPD_SRC" | grep -q "\.gz$"; then
              gunzip -c "$PPD_SRC" > ppd/br1600.ppd
            else
              cp "$PPD_SRC" ppd/br1600.ppd
            fi
          else
            # Si no existe precompilado, generarlo desde el .drv source
            sudo apt-get install -y --no-install-recommends cups-ppdc
            mkdir -p /tmp/brlaser_ppd_build
            cd /tmp/brlaser_ppd_build
            git clone --depth 1 https://github.com/pdewacht/brlaser.git .
            cmake -DCMAKE_POLICY_VERSION_MINIMUM=3.5 . && make brlaser.drv
            ppdc brlaser.drv -d .
            cp br1600.ppd "$GITHUB_WORKSPACE/ppd/br1600.ppd"
            cd "$GITHUB_WORKSPACE"
          fi
          ls -la ppd/
          head -20 ppd/br1600.ppd || echo "PPD file issue"

          ls -la bin/ lib/ gs_share/ ppd/
          du -sh bin/ lib/ gs_share/ ppd/

      - name: Test gs version
        run: |
          ./bin/gs --version
          ./bin/gs -h 2>&1 | head -30

      - name: Commit binaries
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add bin/ lib/ gs_share/ ppd/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m 'build: refresh Linux binaries (gs + rastertobrlaser + gs_share + ppd)'
          git push
