name: Build Linux binaries (gs + rastertobrlaser)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'bin/**'
      - 'lib/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gs and brlaser via apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ghostscript \
            ghostscript-x \
            libgs-dev \
            printer-driver-brlaser \
            cups \
            libcups2-dev \
            libcupsimage2-dev

      - name: Locate binaries
        run: |
          which gs
          gs --version
          ls -la /usr/lib/cups/filter/ | grep -i brlaser
          file /usr/lib/cups/filter/rastertobrlaser

      - name: Copy binaries + dependencies to bin/
        run: |
          rm -rf bin lib
          mkdir -p bin lib
          # GhostScript binary
          cp $(which gs) bin/gs
          chmod +x bin/gs
          # brlaser CUPS filter
          cp /usr/lib/cups/filter/rastertobrlaser bin/rastertobrlaser
          chmod +x bin/rastertobrlaser
          # Bundle shared library dependencies (excluding libc, ld-linux, libdl, libpthread)
          # which come from the Vercel runtime's own glibc.
          EXCLUDE_RE='^(linux-vdso|linux-gate|ld-linux|libc|libdl|libpthread|librt|libnsl|libutil|libresolv|libm|libgcc_s)\.so'
          for binary in bin/gs bin/rastertobrlaser; do
            ldd "$binary" | awk '{print $3}' | grep -v '^$' | while read lib; do
              base=$(basename "$lib")
              if echo "$base" | grep -qE "$EXCLUDE_RE"; then
                echo "  SKIP system lib: $base"
              else
                cp -L "$lib" lib/
                echo "  COPY: $base"
              fi
            done
          done
          ls -la bin/ lib/
          du -sh bin/ lib/

      - name: Test gs version
        run: |
          ./bin/gs --version
          ./bin/gs -h 2>&1 | head -30

      - name: Commit binaries
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add bin/ lib/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m 'build: refresh Linux binaries (gs + rastertobrlaser)'
          git push
